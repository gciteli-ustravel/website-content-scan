name: Excel Fallback Test

on:
  workflow_dispatch:
    inputs:
      excel_path:
        description: "Path to Excel export in the repo"
        required: true
        default: "test-inputs/Website Content Scan.xlsx"

jobs:
  update-excel:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run Excel fallback
        run: |
          mkdir -p output
          python scripts/update_scan.py \
            --config sites.yml \
            --excel-input "${{ inputs.excel_path }}" \
            --excel-output "output/Website Content Scan.updated.xlsx"

      - name: Upload updated workbook
        uses: actions/upload-artifact@v4
        with:
          name: website-content-scan-updated-workbook
          path: output/Website Content Scan.updated.xlsx
