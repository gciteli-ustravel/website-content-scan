name: Update Website Content Scan

on:
  workflow_dispatch:
  schedule:
    - cron: "0 14 * * 1"

jobs:
  update-smartsheet:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install -r website_content_scan/requirements.txt

      - name: Update Smartsheet
        env:
          SMARTSHEET_ACCESS_TOKEN: ${{ secrets.SMARTSHEET_ACCESS_TOKEN }}
          SMARTSHEET_SHEET_ID: ${{ secrets.SMARTSHEET_SHEET_ID }}
        run: python website_content_scan/scripts/update_scan.py --config website_content_scan/sites.yml
